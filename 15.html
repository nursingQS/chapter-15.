<script>
    // Chapter 15: Intraoperative Nursing Management – 38 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. The nurse is preparing an elderly client for a scheduled removal of orthopedic hardware, a procedure to be performed under general anesthetic. For which adverse effect should the nurse most closely monitor the client?",
            options: [
                "A. Hypothermia",
                "B. Pulmonary edema",
                "C. Cerebral ischemia",
                "D. Arthritis"
            ],
            correct: 0, // A
            rationale: "Inadvertent hypothermia may occur as a result of a low temperature in the OR, infusion of cold fluids, inhalation of cold gases, open body wounds or cavities, decreased muscle activity, advanced age, or the pharmaceutical agents used (e.g., vasodilators, phenothiazines, general anesthetics). Older adults are particularly susceptible to this. The anesthetist monitors for pulmonary edema and cerebral ischemia. Arthritis is not an adverse effect of surgical anesthesia. (PTS:1 REF:p.431)"
        },
        {
            id: 2,
            question: "2. The operating room nurse acts in the circulating role during a client's scheduled cesarean section. For which task is this nurse responsible?",
            options: [
                "A. Performing documentation",
                "B. Estimating the client's blood loss",
                "C. Setting up the sterile tables",
                "D. Gives the surgeon instruments during surgery"
            ],
            correct: 0, // A
            rationale: "Main responsibilities of the circulating nurse include verifying consent; coordinating the team; and ensuring cleanliness, proper temperature and humidity, lighting, safe function of equipment, and the availability of supplies and materials. The circulating nurse monitors aseptic practices to avoid breaks in technique while coordinating the movement of related personnel as well as implementing fire safety precautions. The circulating nurse also monitors the client and documents specific activities throughout the operation to ensure the client's safety and well-being. Estimating the client's blood loss is the surgeon's responsibility; setting up the sterile tables is the responsibility of the first scrub; and giving the surgeon sterile instruments during surgery is the responsibility of the scrub nurse. (PTS:1 REF:p.419)"
        },
        {
            id: 3,
            question: "3. A surgical nurse is preparing to enter the restricted zone of the operating room. Which surgical attire should this nurse wear? Select all that apply.",
            options: [
                "A. Street clothes",
                "B. Cap",
                "C. Mask",
                "D. Shoe covers",
                "E. Scrub clothes"
            ],
            correct: [1,2,3,4], // B, C, D, E
            rationale: "In the restricted zone of the operating room, all personnel should wear scrub clothes, shoe covers, caps, and masks to reduce transmission of microbes. Street clothes are appropriate attire for unrestricted zones. (PTS:1 REF:p.421)"
        },
        {
            id: 4,
            question: "4. A circulating nurse provides care in a surgical department that has multiple surgeries scheduled for the day. The nurse should know to monitor which client most closely during the intraoperative period because of the increased risk for hypothermia?",
            options: [
                "A. A 74-year-old client with a low body mass index",
                "B. A 17-year-old client with traumatic injuries",
                "C. A 45-year-old client having an abdominal hysterectomy",
                "D. A 13-year-old client undergoing craniofacial surgery"
            ],
            correct: 0, // A
            rationale: "Older clients are at greatest risk during surgical procedures because they have an impaired ability to increase their metabolic rate and impaired thermoregulatory mechanisms, which increase susceptibility to hypothermia. The other clients are likely at a lower risk. (PTS:1 REF:p.418)"
        },
        {
            id: 5,
            question: "5. The anesthetist is coming to the surgical admissions unit to see a client prior to surgery scheduled for tomorrow morning. What is the priority information that the nurse should provide to the anesthetist during the visit?",
            options: [
                "A. Last bowel movement",
                "B. Latex allergy",
                "C. Number of pregnancies",
                "D. Difficulty falling asleep"
            ],
            correct: 1, // B
            rationale: "Due to the increased number of clients with latex allergies, it is essential to identify this allergy early on so precautions can be taken in the OR. The anesthetist should be informed of any allergies. This is a priority over pregnancy history, insomnia, or recent bowel function, though some of these may be relevant. (PTS:1 REF:p.431)"
        },
        {
            id: 6,
            question: "6. An operating room (OR) nurse is teaching a nursing student about the principles of surgical asepsis as a requirement in the restricted zone of the operating suite. Which personal protective equipment should the nurse wear at all times in the restricted zone of the OR?",
            options: [
                "A. Bubble mask",
                "B. Mask covering the nose and mouth",
                "C. Goggles",
                "D. Gloves"
            ],
            correct: 1, // B
            rationale: "Masks are worn at all times in the restricted zone of the OR. In hospitals where numerous total joint procedures are performed, a complete bubble mask may be used. This mask provides full-barrier protection from bone fragments and splashes. Goggles and gloves are worn as required, but not necessarily at all times. (PTS:1 REF:p.421)"
        },
        {
            id: 7,
            question: "7. An operating room nurse is participating in an interdisciplinary audit of infection control practices in the surgical department. The nurse should know that a basic guideline for maintaining surgical asepsis is which of the following?",
            options: [
                "A. Sterile surfaces or articles may touch other sterile surfaces.",
                "B. Sterile supplies can be used on another client if the packages are intact.",
                "C. The outer lip of a sterile solution is considered sterile.",
                "D. The scrub nurse may pour a sterile solution from a nonsterile bottle."
            ],
            correct: 0, // A
            rationale: "Basic guidelines for maintaining sterile technique include that sterile surfaces or articles may touch other sterile surfaces only. The other options each constitute a break in sterile technique. (PTS:1 REF:p.422)"
        },
        {
            id: 8,
            question: "8. A surgical client has been given general anesthesia and is in stage II (the excitement stage) of anesthesia. Which intervention would be most appropriate for the nurse to implement during this stage?",
            options: [
                "A. Rub the client's back.",
                "B. Provide for client safety.",
                "C. Encourage the client to express feelings.",
                "D. Stroke the client's hand."
            ],
            correct: 1, // B
            rationale: "In stage II, the client may struggle, shout, or laugh. The movements of the client may be uncontrolled, so it is essential that the nurse be ready to help to restrain the client for safety, if necessary. Rubbing the client's back, encouraging the client to express feelings, or stroking the client's hand do not protect client safety and therefore are not the priority. (PTS:1 REF:p.424)"
        },
        {
            id: 9,
            question: "9. A client waiting in the presurgical holding area asks the nurse, 'Why exactly do they have to put a breathing tube into me? My surgery is on my knee.' What is the best rationale for intubation during a surgical procedure that the nurse should describe?",
            options: [
                "A. The tube provides an airway for ventilation.",
                "B. The tube protects the client's esophagus from trauma.",
                "C. The client may receive an antiemetic through the tube.",
                "D. The client's vital signs can be monitored with the tube."
            ],
            correct: 0, // A
            rationale: "The anesthetic is given and the client's airway is maintained through an intranasal intubation, oral intubation, or a laryngeal mask airway. The tube also helps protect aspiration of stomach contents. The tube does not protect the esophagus. Because the tube goes into the lungs, no medications are given through the tube. The client's vital signs are not monitored through the tube. (PTS:1 REF:p.426)"
        },
        {
            id: 10,
            question: "10. The circulating nurse in an outpatient surgery center is assessing a client who is scheduled to receive moderate sedation. Which principle should guide the care of a client receiving this form of anesthesia?",
            options: [
                "A. The client must never be left unattended by the nurse.",
                "B. The client should begin a course of antiemetics the day before surgery.",
                "C. The client should be informed that the client will remember most of the procedure.",
                "D. The client must be able to maintain the client's own airway."
            ],
            correct: 0, // A
            rationale: "The client receiving moderate sedation should never be left unattended. The client's ability to maintain the client's own airway depends on the level of sedation. The administration of moderate sedation is not an indication for giving an antiemetic. The client receiving moderate sedation does not remember most of the procedure. (PTS:1 REF:p.435)"
        },
        {
            id: 11,
            question: "11. A nurse is caring for a client following knee surgery that was performed under a spinal anesthetic. What intervention should the nurse implement to prevent a spinal headache?",
            options: [
                "A. Seat the client in a chair and have them perform deep breathing exercises.",
                "B. Ambulate the client as early as possible.",
                "C. Limit the client's fluid intake for the first 24 hours postoperatively.",
                "D. Keep the client positioned supine."
            ],
            correct: 3, // D
            rationale: "Measures that increase cerebrospinal pressure are helpful in relieving headache. These include maintaining a quiet environment, keeping the client lying flat, and keeping the client well hydrated. Having the client sit or stand up decreases cerebrospinal pressure and would not relieve a spinal headache. Limiting fluids is incorrect because it also decreases cerebrospinal pressure and would not relieve a spinal headache. (PTS:1 REF:p.429)"
        },
        {
            id: 12,
            question: "12. The operating room nurse will be caring for a client who will receive a transsacral block. The use of a transsacral block for pain control would be most appropriate for a client undergoing which procedure?",
            options: [
                "A. Thoracotomy",
                "B. Inguinal hernia repair",
                "C. Reduction mammoplasty",
                "D. Closed reduction of a right humerus fracture"
            ],
            correct: 1, // B
            rationale: "A transsacral block produces anesthesia for the perineum and lower abdomen. Both a thoracotomy and breast reduction are in the chest region, and a transsacral block would not provide pain control for these procedures. A closed reduction of a right humerus is a procedure on the right arm, and a transsacral block would not provide pain control. (PTS:1 REF:p.429)"
        },
        {
            id: 13,
            question: "13. The circulating nurse will be participating in a 78-year-old client's total hip replacement. Which consideration should the nurse prioritize during the preparation of the client in the operating room?",
            options: [
                "A. The client should be placed in Trendelenburg position.",
                "B. The client must be firmly restrained at all times.",
                "C. Pressure points should be assessed and well padded.",
                "D. The preoperative shave should be done by the circulating nurse."
            ],
            correct: 2, // C
            rationale: "The vascular supply should not be obstructed nor nerves damaged by an awkward position or undue pressure on a body part. During surgical procedures, the client is at risk for impairment of skin integrity due to a stationary position and immobility. An older client is at an increased risk of injury and impaired skin integrity. Therefore, pressure points should be assessed and well padded. A Trendelenburg position is not indicated for this client. Once anesthetized for a total hip replacement, the client cannot move; restraints are not necessary. A preoperative shave is not performed; excess hair is removed by means of a clipper. (PTS:1 REF:p.418)"
        },
        {
            id: 14,
            question: "14. The nurse is taking the client into the operating room (OR) when the client informs the nurse that the client's grandparent spiked a very high temperature in the OR and nearly died 15 years ago. What relevance does this information have regarding the client?",
            options: [
                "A. The client may be experiencing presurgical anxiety.",
                "B. The client may be at risk for malignant hyperthermia.",
                "C. The grandparent's surgery has minimal relevance to the client's surgery.",
                "D. The client may be at risk for a sudden onset of postsurgical infection."
            ],
            correct: 1, // B
            rationale: "Malignant hyperthermia is an inherited muscle disorder chemically induced by anesthetic agents. Identifying clients at risk is imperative because the mortality rate is 50%. The client's anxiety is not relevant, the grandparent's surgery is very relevant, and all clients are at risk for postsurgical infections. (PTS:1 REF:p.432)"
        },
        {
            id: 15,
            question: "15. While the surgical client is anesthetized, the scrub nurse hears a member of the surgical team make an inappropriate remark about the client's weight. How should the nurse best respond?",
            options: [
                "A. Ignore the comment because the client is unconscious.",
                "B. Discourage the colleague from making such comments.",
                "C. Report the comment immediately to a supervisor.",
                "D. Realize that humor is needed in the workplace."
            ],
            correct: 1, // B
            rationale: "Clients, whether conscious or unconscious, should not be subjected to excess noise, inappropriate conversation, or, most of all, derogatory comments. The nurse must act as an advocate on behalf of the client and discourage any such remarks. Reporting to a supervisor, however, is not likely necessary. (PTS:1 REF:p.435)"
        },
        {
            id: 16,
            question: "16. The nurse is caring for a client who has had spinal anesthesia. The client is under a health care provider's order to lie flat postoperatively. When the client asks to go to the bathroom, the nurse encourages the client to adhere to the health care provider's order. Prevention of which outcome should the nurse include in the rationale for complying with this order?",
            options: [
                "A. Hypotension",
                "B. Respiratory depression",
                "C. Headache",
                "D. Pain at the lumbar injection site"
            ],
            correct: 2, // C
            rationale: "Lying flat reduces the risk of headache after spinal anesthesia. Hypotension and respiratory depression may be adverse effects of spinal anesthesia associated with the spread of the anesthetic, but lying flat does not help reduce these effects. Pain at the lumbar injection site typically is not a problem. (PTS:1 REF:p.429)"
        },
        {
            id: 17,
            question: "17. The nurse is packing a client's abdominal wound with sterile, half-inch Iodoform gauze. During the procedure, the nurse drops some of the gauze onto the client's abdomen 2 inches (5 cm) away from the wound. What should the nurse do?",
            options: [
                "A. Apply povidone-iodine (Betadine) to that section of the gauze and continue packing the wound.",
                "B. Pick up the gauze and continue packing the wound after irrigating the abdominal wound with Betadine solution.",
                "C. Continue packing the wound and inform the health care provider that an antibiotic is needed.",
                "D. Discard the gauze packing and repack the wound with new Iodoform gauze."

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
